<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Page</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .navbar {
            display: flex;
            justify-content: center;
            background-color: #333;
            padding: 10px 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            font-size: 16px;
        }

        .navbar a:hover {
            background-color: #555;
            border-radius: 5px;
        }

        .product-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 20px auto;
            max-width: 1200px;
        }

        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
            width: 300px;
            border-radius: 10px;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
            background-color: #f9f9f9;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: scale(1.05);
            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.2);
        }

        .product-card img {
            max-width: 100%; /* Ensure the image fits within the container */
            height: 200px; /* Standardize the height of all images */
            object-fit: cover; /* Crop the image to fit while maintaining aspect ratio */
            border-radius: 5px; /* Add rounded corners */
            background-color: #f0f0f0; /* Optional background color */
        }

        .product-card h3 {
            margin: 10px 0;
            font-size: 18px;
        }

        .product-card p {
            margin: 5px 0;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <nav>
        <ul class="navbar">
            <li><a href="#" class="category-link" data-category="Footwear">Footwear</a></li>
            <li><a href="#" class="category-link" data-category="Cardio">Cardio</a></li>
            <li><a href="#" class="category-link" data-category="Equipment">Equipment</a></li>
            <li><a href="#" class="category-link" data-category="Accessories">Accessories</a></li>
            <li><a href="#" class="category-link" data-category="Watch">Watch</a></li>
            <li><a href="#" class="category-link" data-category="Cycles">Cycles</a></li>
            <li><a href="#" class="category-link" data-category="Sports">Sports</a></li>
        </ul>
    </nav>
    
    <div class="product-container">
        <!-- Products will dynamically load here -->
    </div>

    <script>
       document.addEventListener('DOMContentLoaded', function () {
    const categoryLinks = document.querySelectorAll('.category-link');
    const productContainer = document.querySelector('.product-container');

    // Fetch products for a given category
    function fetchProducts(category) {
        fetch(`/get_products_by_category?category=${category}`)
            .then(response => response.json())
            .then(products => {
                productContainer.innerHTML = ''; // Clear existing products
                
                if (products.length === 0) {
                    productContainer.innerHTML = '<p>No products found for this category.</p>';
                    return;
                }

                // Loop through products and create cards
                products.forEach(product => {
                    const productDiv = document.createElement('div');
                    productDiv.classList.add('product-card');
                    productDiv.innerHTML = `
                        <img src="/static/${product.image_url}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <p><strong>Price:</strong> ₹${product.price}</p>
                        <p><strong>Specifications:</strong> ${product.specification}</p>
                    `;
                    productContainer.appendChild(productDiv);
                });
            })
            .catch(error => console.error('Error fetching products:', error));
    }

    // Add click event to category links
    categoryLinks.forEach(link => {
        link.addEventListener('click', function (e) {
            e.preventDefault();
            const category = this.getAttribute('data-category');
            fetchProducts(category);
        });
    });

    // Load all products initially
    fetchProducts('All');
});

    </script>
</body>
</html>
