<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Gym Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom right,black,black,white,cyan);
     }
        .container form {
            display: flex;
            flex-direction: column;
        }
        .container input,
        .container select {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .error {
            color: rgb(40, 234, 244);
            font-size: 14px;
        }
        .container {
            background: linear-gradient(to bottom right, cyan,black,black,white);
            border-radius: 10px;
            box-shadow: 0 4px 8px  rgba(0, 0, 0, 0.2);
            padding: 20px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            opacity: 0.7;
        }
        .container h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: white;
        }
        .container form {
            display: flex;
            flex-direction: column;
        }
        .container button {
            padding: 12px 20px;
            margin-top: 20px;
            background: linear-gradient(90deg, #00bcd4, #000000);
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }
        .container button:hover {
            background: linear-gradient(90deg, #000000, #00bcd4);
            transform: scale(1.05);
        }
        .container a {
            color: black;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-top: 10px;
            display: inline-block;
        }
        .container a:hover {
            color: #3ec1d8;
            text-decoration: underline;
        }
        .container p {
            margin-top: 10px;
            font-size:14px;
            color:white;
        }
        label{
            font-weight: bold;
            font-size:15px;
        }
    </style>
    <script>
        function validateForm() {
            var email = document.getElementById("email").value;
            var emailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
            if (!emailPattern.test(email)) {
                alert("Please enter a valid Gmail address (example@gmail.com)");
                return false;
            }
            return true;
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Register for Gym Membership</h1>
        <form action="/register" method="POST" onsubmit="return validateForm()">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="text" name="username" placeholder="Username" required>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
            <input type="number" name="age" placeholder="Age" required>
            <input type="tel" name="mobile" placeholder="Mobile Number" required>
            <input type="email" id="email" name="email" placeholder="Email (example@gmail.com)" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="/login">Login here</a></p>
    </div>
</body>
</html>
