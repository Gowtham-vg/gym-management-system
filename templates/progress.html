<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Report</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f5f5f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #ff7300; color: white; }
        .nav-buttons { margin-top: 20px; }
        .nav-buttons a { padding: 10px 20px; background: linear-gradient(90deg, #00bcd4, #000000); color: white; text-decoration: none; border-radius: 5px; }
        .nav-buttons a:hover { background: linear-gradient(90deg, #000000, #00bcd4); }
    </style>
</head>
<body>

<div class="container">
    <h2>User Progress Report</h2>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Workout Type</th>
                <th>Duration (mins)</th>
                <th>Calories Burned</th>
                <th>Weight Lifted (kg)</th>
                <th>Streak</th>
            </tr>
        </thead>
        <tbody>
            {% for p in progress %}
            <tr>
                <td>{{ p.workout_date }}</td>
                <td>{{ p.workout_type }}</td>
                <td>{{ p.duration }}</td>
                <td>{{ p.calories_burned }}</td>
                <td>{{ p.weight_lifted }}</td>
                <td>{{ p.streak }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="nav-buttons">
    <a href="{{ url_for('user_dashboard') }}">Back to Dashboard</a>

</div>

</body>
</html>
