<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
</head>
<body>
    <h2>Verify OTP</h2>
    <form action="/verify-otp?email={{ email }}" method="POST">
        <label for="otp">Enter OTP:</label><br>
        <input type="text" id="otp" name="otp" placeholder="Enter OTP" required><br><br>

        <label for="new_password">Enter your new password:</label><br>
        <input type="password" id="new_password" name="new_password" placeholder="Enter new password" required><br><br>

        <button type="submit">Reset Password</button>
    </form>
</body>
</html>
